name: CD

# Backend (Render) and frontend (Vercel) deploy on every push to main.
#
# Smart contracts are deliberately NOT deployed on every push — the Soroban
# contracts are already live on testnet and redeploying them each push would
# churn addresses and cost XLM. The deploy-contract job therefore runs ONLY on a
# manual `workflow_dispatch` where you explicitly opt in (deploy_contracts=true).
# When it does redeploy, it rewrites the downstream services' contract-address
# env vars to what this run produced; otherwise backend/frontend ship against the
# currently-live address, so a redeploy never silently goes unused and a normal
# push never touches the contracts.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_contracts:
        description: "Also build & deploy the Soroban contracts to testnet"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────── Deploy smart contracts ──────────────────────
  deploy-contract:
    name: Deploy contracts (Stellar testnet)
    runs-on: ubuntu-latest
    # This job RUNS on every push (so it shows a green ✓ like the other deploy
    # jobs), but the actual `stellar contract deploy` below only fires on an
    # opt-in manual run — a push never redeploys the contracts.
    outputs:
      gift_escrow: ${{ steps.addresses.outputs.gift_escrow }}
      shielded_pool: ${{ steps.addresses.outputs.shielded_pool }}
      groth16_verifier: ${{ steps.addresses.outputs.groth16_verifier }}
      deployed: ${{ steps.addresses.outputs.deployed }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (+ wasm32v1-none target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      # Fallback system libs in case binstall has to compile from source
      # (stellar-cli's hardware-wallet/keyring crates link dbus-1 and libudev).
      - name: Install Stellar CLI build deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      # Pulls the prebuilt stellar binary — no native compilation needed.
      - name: Install Stellar CLI
        run: cargo binstall --no-confirm stellar-cli

      - name: Build and deploy contracts
        id: addresses
        working-directory: contracts
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          set -euo pipefail

          # Contracts are only (re)deployed on an opt-in manual run — never on a
          # push. On a push this exits 0 (job stays green) without deploying, and
          # downstream services keep using the currently-live contract address.
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ inputs.deploy_contracts }}" != "true" ]; then
            echo "::notice::Not an opt-in manual deploy — skipping contract deploy (contracts are not redeployed on pushes)."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$STELLAR_SECRET_KEY" ]; then
            echo "::warning::STELLAR_SECRET_KEY not set — cannot deploy. Add it in repo Settings → Secrets and variables → Actions to enable this job."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Import the funded deployer key under a stable alias.
          printf '%s\n' "$STELLAR_SECRET_KEY" | stellar keys add giffy-deployer --secret-key --overwrite

          stellar contract build

          deploy() {
            stellar contract deploy \
              --wasm "target/wasm32v1-none/release/$1.wasm" \
              --source giffy-deployer \
              --network testnet
          }

          GIFT_ESCROW=$(deploy gift_escrow)
          SHIELDED_POOL=$(deploy shielded_pool)
          GROTH16_VERIFIER=$(deploy groth16_verifier)

          {
            echo "gift_escrow=$GIFT_ESCROW"
            echo "shielded_pool=$SHIELDED_POOL"
            echo "groth16_verifier=$GROTH16_VERIFIER"
            echo "deployed=true"
          } >> "$GITHUB_OUTPUT"

  # ────────────────────────── Deploy backend ───────────────────────────
  deploy-backend:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    # Runs on every push. deploy-contract is skipped on pushes (contracts are
    # opt-in), so `always()` lets the backend still ship; it only rewrites its
    # contract-address env vars when contracts were genuinely redeployed.
    if: ${{ always() && needs.deploy-contract.result != 'failure' }}
    steps:
      - name: Update Render env vars (if contracts redeployed) and redeploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          CONTRACTS_DEPLOYED: ${{ needs.deploy-contract.outputs.deployed }}
        run: |
          set -euo pipefail

          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::warning::RENDER_API_KEY / RENDER_SERVICE_ID not set — skipping backend redeploy. Add both in repo Settings → Secrets and variables → Actions to enable this job."
            exit 0
          fi

          if [ "$CONTRACTS_DEPLOYED" = "true" ]; then
            # PUT .../env-vars/{key} upserts ONE variable — unlike the plural
            # .../env-vars endpoint (full replace), this cannot clobber unrelated
            # backend config (Mongo URI, CORS origin, cron schedules, etc).
            set_env_var() {
              curl -sf -X PUT "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$1" \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"value\": \"$2\"}" > /dev/null
              echo "    set $1"
            }

            echo "==> Contracts were redeployed — updating backend env vars to the new addresses..."
            set_env_var GIFT_ESCROW_CONTRACT_ID   "${{ needs.deploy-contract.outputs.gift_escrow }}"
            set_env_var SHIELDED_POOL_CONTRACT_ID "${{ needs.deploy-contract.outputs.shielded_pool }}"
          else
            echo "==> Contracts were not redeployed this run — leaving backend env vars as-is."
          fi

          echo "==> Triggering Render deploy..."
          curl -sf -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'

  # ────────────────────────── Deploy frontend ──────────────────────────
  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [deploy-contract, deploy-backend]
    if: ${{ always() && needs.deploy-backend.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID not set — skipping Vercel deploy. Add them in repo Settings → Secrets and variables → Actions to enable this job."
            exit 0
          fi

          # VERCEL_ORG_ID + VERCEL_PROJECT_ID are Vercel's documented way to skip
          # interactive `vercel link`; the project's configured Root Directory
          # (frontend) is applied by Vercel during the build.
          #
          # Contract deploy is opt-in and skipped on pushes, in which case
          # deploy-contract's outputs are empty — fall back to the currently-live
          # contract address so the frontend still deploys against a real contract.
          npx --yes vercel deploy --prod --yes --token "$VERCEL_TOKEN" \
            -b NEXT_PUBLIC_API_BASE_URL="${{ vars.API_BASE_URL || 'https://giffy-h3q3.onrender.com/api' }}" \
            -b NEXT_PUBLIC_HORIZON_URL=https://horizon-testnet.stellar.org \
            -b NEXT_PUBLIC_STELLAR_NETWORK=TESTNET \
            -b NEXT_PUBLIC_GIFT_ESCROW_CONTRACT_ID="${{ needs.deploy-contract.outputs.gift_escrow || 'CCABIQYBL53CPLZLXCDNG4TQ54RUCWHZJXFLCROETVU3LGGXQZXZUWT4' }}" \
            -b NEXT_PUBLIC_ANCHOR_HOME_DOMAIN=testanchor.stellar.org
